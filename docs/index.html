<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>競合ウォッチ・ダッシュボード</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #242736;
      --border: #2e3348;
      --text: #e2e8f0;
      --text-muted: #8892a4;
      --accent: #6366f1;
      --green: #22c55e;
      --yellow: #f59e0b;
      --red: #ef4444;
      --blue: #3b82f6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    header h1 { font-size: 1.25rem; font-weight: 700; }
    header .subtitle { font-size: 0.8rem; color: var(--text-muted); }

    .badge {
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
    }
    .badge-changed  { background: #f59e0b22; color: var(--yellow); }
    .badge-new      { background: #6366f122; color: var(--accent); }
    .badge-unchanged{ background: #22c55e22; color: var(--green); }
    .badge-error    { background: #ef444422; color: var(--red); }

    .threat {
      display: inline-flex;
      gap: 2px;
    }
    .threat-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border);
    }
    .threat-dot.active { background: var(--red); }
    .threat-dot.active.mid { background: var(--yellow); }
    .threat-dot.active.low { background: var(--green); }

    main { max-width: 1100px; margin: 0 auto; padding: 2rem; }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1.25rem;
    }
    .stat-card .label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.4rem; }
    .stat-card .value { font-size: 2rem; font-weight: 700; }

    .section-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }

    .cards { display: grid; gap: 1rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1.5rem;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: var(--accent); }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .card-title { font-weight: 700; font-size: 1rem; }
    .card-url   { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.2rem; }
    .card-url a { color: var(--accent); text-decoration: none; }
    .card-url a:hover { text-decoration: underline; }

    .card-meta {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-shrink: 0;
    }

    .analysis-block {
      background: var(--surface2);
      border-radius: 0.5rem;
      padding: 1rem;
      margin-top: 0.75rem;
    }

    .analysis-block .summary {
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 0.75rem;
    }

    .analysis-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      font-size: 0.8rem;
    }

    .analysis-item .item-label {
      color: var(--text-muted);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.25rem;
    }

    .actions-list {
      list-style: none;
      padding: 0;
    }
    .actions-list li {
      padding: 0.2rem 0;
      padding-left: 0.75rem;
      position: relative;
    }
    .actions-list li::before {
      content: "›";
      position: absolute;
      left: 0;
      color: var(--accent);
    }

    .no-analysis {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-style: italic;
    }

    .generated-at {
      text-align: right;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 2rem;
    }

    #loading {
      text-align: center;
      padding: 4rem;
      color: var(--text-muted);
    }

    .confidence-badge {
      font-size: 0.7rem;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .history-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      margin-bottom: 0.75rem;
      overflow: hidden;
    }
    .history-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 1.25rem;
      cursor: pointer;
      user-select: none;
    }
    .history-header:hover { background: var(--surface2); }
    .history-date { font-weight: 600; font-size: 0.95rem; }
    .history-arrow { margin-left: auto; color: var(--text-muted); transition: transform 0.2s; }
    .history-arrow.open { transform: rotate(180deg); }
    .history-body {
      display: none;
      padding: 0 1.25rem 1.25rem;
      border-top: 1px solid var(--border);
    }
    .history-body.open { display: block; }

    /* ── 管理UI ── */
    .header-actions { margin-left: auto; display: flex; gap: 0.5rem; align-items: center; }

    .btn {
      padding: 0.4rem 0.85rem;
      border-radius: 0.5rem;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      transition: background 0.15s;
    }
    .btn:hover { background: var(--border); }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-primary:hover { background: #4f52d0; }
    .btn-danger { background: #ef444422; border-color: var(--red); color: var(--red); }
    .btn-danger:hover { background: #ef444444; }
    .btn-sm { padding: 0.2rem 0.6rem; font-size: 0.72rem; }

    .card-actions { display: flex; gap: 0.4rem; margin-top: 0.75rem; justify-content: flex-end; }

    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1.75rem;
      width: 100%;
      max-width: 440px;
      z-index: 101;
      position: relative;
    }
    .modal-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.5rem; }
    .modal-desc { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 1rem; line-height: 1.5; }
    .modal-label { font-size: 0.78rem; color: var(--text-muted); display: block; margin-bottom: 0.3rem; margin-top: 0.75rem; }
    .modal-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      color: var(--text);
      padding: 0.55rem 0.75rem;
      font-size: 0.88rem;
    }
    .modal-input:focus { outline: 2px solid var(--accent); }
    .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1.25rem; }

    .toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 0.75rem 1.25rem;
      font-size: 0.85rem;
      z-index: 200;
      animation: slideIn 0.2s ease;
    }
    .toast.success { border-color: var(--green); color: var(--green); }
    .toast.error   { border-color: var(--red);   color: var(--red); }
    @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>競合ウォッチ・ダッシュボード</h1>
      <div class="subtitle">競合サイト自動監視 + AI 戦略分析</div>
    </div>
    <div class="header-actions">
      <a href="archive.html" class="btn">アーカイブ済み →</a>
      <button class="btn" onclick="openTokenModal()">🔑 トークン</button>
      <button class="btn btn-primary" onclick="openAddModal()">＋ サイト追加</button>
    </div>
  </header>

  <main>
    <div id="loading">レポートを読み込み中...</div>
    <div id="app" style="display:none">
      <div class="stats" id="stats"></div>
      <div class="section-title">監視対象サイト</div>
      <div class="cards" id="cards"></div>
      <div class="generated-at" id="generated-at"></div>

      <div id="history-section" style="margin-top:2.5rem; display:none">
        <div class="section-title">変更履歴</div>
        <div id="history-list"></div>
      </div>
    </div>
  </main>

  <!-- トークン設定モーダル -->
  <div id="token-modal" style="display:none">
    <div class="modal-overlay" onclick="closeModal('token-modal')">
      <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-title">🔑 GitHub トークン設定</div>
        <div class="modal-desc">
          サイトの追加・アーカイブには GitHub Personal Access Token が必要です。<br>
          <a href="https://github.com/settings/tokens/new?scopes=repo&description=watcher-dashboard" target="_blank" rel="noopener" style="color:var(--accent)">こちらで発行</a>（Contents の読み書き権限）し、貼り付けてください。ブラウザのローカルストレージにのみ保存されます。
        </div>
        <label class="modal-label">Personal Access Token</label>
        <input type="password" id="token-input" class="modal-input" placeholder="ghp_xxxxxxxxxxxx">
        <div class="modal-actions">
          <button class="btn" onclick="closeModal('token-modal')">キャンセル</button>
          <button class="btn btn-primary" onclick="saveToken()">保存</button>
        </div>
      </div>
    </div>
  </div>

  <!-- サイト追加モーダル -->
  <div id="add-modal" style="display:none">
    <div class="modal-overlay" onclick="closeModal('add-modal')">
      <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-title">＋ サイトを追加</div>
        <label class="modal-label">サイト名</label>
        <input type="text" id="add-name" class="modal-input" placeholder="例: 競合A社">
        <label class="modal-label">URL</label>
        <input type="url" id="add-url" class="modal-input" placeholder="https://example.com">
        <div class="modal-actions">
          <button class="btn" onclick="closeModal('add-modal')">キャンセル</button>
          <button class="btn btn-primary" id="add-submit" onclick="addSite()">追加</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const REPO = "koike-apie/watcher";

    /* ── GitHub API ── */
    function getToken() { return localStorage.getItem("gh_token") || ""; }

    async function ghGet(path) {
      const headers = { Accept: "application/vnd.github.v3+json" };
      if (getToken()) headers.Authorization = `token ${getToken()}`;
      const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, { headers });
      if (!res.ok) throw new Error(`GitHub API ${res.status}`);
      return res.json();
    }

    async function ghPut(path, content, sha, message) {
      const token = getToken();
      if (!token) { openTokenModal(); throw new Error("token required"); }
      const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
        method: "PUT",
        headers: {
          Authorization: `token ${token}`,
          Accept: "application/vnd.github.v3+json",
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ message, content: btoa(unescape(encodeURIComponent(content))), sha, branch: "main" }),
      });
      if (!res.ok) { const e = await res.json(); throw new Error(e.message || res.status); }
      return res.json();
    }

    async function readTargets() {
      const data = await ghGet("config/targets.json");
      return { config: JSON.parse(atob(data.content.replace(/\n/g, ""))), sha: data.sha };
    }

    async function writeTargets(config, sha, message) {
      return ghPut("config/targets.json", JSON.stringify(config, null, 2), sha, message);
    }

    /* ── トークン ── */
    function openTokenModal() {
      document.getElementById("token-input").value = getToken();
      document.getElementById("token-modal").style.display = "block";
    }
    function saveToken() {
      const t = document.getElementById("token-input").value.trim();
      if (t) localStorage.setItem("gh_token", t);
      closeModal("token-modal");
      toast("トークンを保存しました", "success");
    }

    /* ── サイト追加 ── */
    function openAddModal() {
      if (!getToken()) { openTokenModal(); return; }
      document.getElementById("add-name").value = "";
      document.getElementById("add-url").value = "";
      document.getElementById("add-modal").style.display = "block";
    }

    async function addSite() {
      const name = document.getElementById("add-name").value.trim();
      const url  = document.getElementById("add-url").value.trim();
      if (!name || !url) { toast("名前と URL を入力してください", "error"); return; }
      let id;
      try {
        id = new URL(url).hostname.replace(/^www\./, "").replace(/[^a-z0-9]/gi, "_").slice(0, 30);
      } catch { toast("URL が正しくありません", "error"); return; }

      const btn = document.getElementById("add-submit");
      btn.disabled = true; btn.textContent = "追加中...";
      try {
        const { config, sha } = await readTargets();
        if (config.targets.some(t => t.id === id || t.url === url)) {
          toast("すでに登録済みのサイトです", "error"); return;
        }
        config.targets.push({
          id, name, url,
          selectors: { main_content: "main, article, .content, body", title: "title, h1" },
          enabled: true,
          archived: false,
        });
        await writeTargets(config, sha, `feat: add ${name} to watch targets`);
        closeModal("add-modal");
        toast(`「${name}」を追加しました。次回の監視から対象になります。`, "success");
      } catch (e) {
        toast("エラー: " + e.message, "error");
      } finally {
        btn.disabled = false; btn.textContent = "追加";
      }
    }

    /* ── アーカイブ ── */
    async function archiveSite(id, name) {
      if (!getToken()) { openTokenModal(); return; }
      if (!confirm(`「${name}」をアーカイブしますか？\n次回の監視から除外されます。`)) return;
      try {
        const { config, sha } = await readTargets();
        const target = config.targets.find(t => t.id === id);
        if (!target) throw new Error("対象が見つかりません");
        target.enabled  = false;
        target.archived = true;
        target.archived_at = new Date().toISOString().slice(0, 10);
        await writeTargets(config, sha, `chore: archive ${name}`);
        document.getElementById("card-" + id)?.remove();
        toast(`「${name}」をアーカイブしました`, "success");
      } catch (e) {
        toast("エラー: " + e.message, "error");
      }
    }

    /* ── モーダル・トースト ── */
    function closeModal(id) { document.getElementById(id).style.display = "none"; }

    function toast(msg, type = "success") {
      const el = document.createElement("div");
      el.className = `toast ${type}`;
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }

    const STATUS_LABELS = {
      changed:   { label: "変更あり", cls: "badge-changed" },
      new:       { label: "初回取得", cls: "badge-new" },
      unchanged: { label: "変更なし", cls: "badge-unchanged" },
      error:     { label: "エラー",   cls: "badge-error" },
    };

    function badge(status) {
      const s = STATUS_LABELS[status] || { label: status, cls: "" };
      return `<span class="badge ${s.cls}">${s.label}</span>`;
    }

    function threatDots(level) {
      if (!level) return "";
      const dots = Array.from({ length: 5 }, (_, i) => {
        const active = i < level;
        const cls = active ? (level <= 2 ? "active low" : level <= 3 ? "active mid" : "active") : "";
        return `<span class="threat-dot ${cls}"></span>`;
      }).join("");
      return `<span class="threat" title="脅威レベル ${level}/5">${dots}</span>`;
    }

    function renderAnalysis(analysis) {
      if (!analysis) return `<p class="no-analysis">分析なし（変更が検出されませんでした）</p>`;

      const actions = analysis.recommended_actions || {};
      const short = (actions.short_term || []).slice(0, 3);
      const mid   = (actions.mid_term   || []).slice(0, 2);
      const details = analysis.change_details || [];

      const detailsHtml = details.length
        ? `<ul class="actions-list">${details.map(d => `<li>${d}</li>`).join("")}</ul>`
        : "";
      const shortHtml = short.length
        ? `<ul class="actions-list">${short.map(a => `<li>${a}</li>`).join("")}</ul>`
        : "なし";
      const midHtml = mid.length
        ? `<ul class="actions-list">${mid.map(a => `<li>${a}</li>`).join("")}</ul>`
        : "なし";

      const confidenceLabel = { high: "高", medium: "中", low: "低" }[analysis.confidence] || analysis.confidence;

      return `
        <div class="analysis-block">
          ${detailsHtml ? `
          <div style="margin-bottom:0.85rem">
            <div class="item-label" style="margin-bottom:0.4rem">具体的な変更点</div>
            ${detailsHtml}
          </div>` : ""}
          <div class="summary">${analysis.summary || ""}</div>
          <div class="analysis-grid">
            <div class="analysis-item">
              <div class="item-label">変更カテゴリ</div>
              <div>${analysis.change_nature || "不明"}</div>
            </div>
            <div class="analysis-item">
              <div class="item-label">戦略的意図</div>
              <div>${analysis.strategic_intent || "不明"}</div>
            </div>
            <div class="analysis-item">
              <div class="item-label">短期推奨アクション</div>
              <div>${shortHtml}</div>
            </div>
            <div class="analysis-item">
              <div class="item-label">中期推奨アクション</div>
              <div>${midHtml}</div>
            </div>
          </div>
          <div style="margin-top:0.75rem; font-size:0.75rem; color:var(--text-muted)">
            信頼度: <span class="confidence-badge">${confidenceLabel}</span>
          </div>
        </div>
      `;
    }

    function renderCard(result) {
      const s = result.status;
      const analysis = result.analysis;
      const level = analysis?.threat_level || 0;

      return `
        <div class="card" id="card-${result.id}">
          <div class="card-header">
            <div>
              <div class="card-title">${result.name}</div>
              <div class="card-url"><a href="${result.url}" target="_blank" rel="noopener">${result.url}</a></div>
            </div>
            <div class="card-meta">
              ${threatDots(level)}
              ${badge(s)}
            </div>
          </div>
          ${renderAnalysis(analysis)}
          <div class="card-actions">
            <button class="btn btn-sm btn-danger" onclick="archiveSite('${result.id}', '${result.name.replace(/'/g, "\\'")}')">アーカイブ</button>
          </div>
        </div>
      `;
    }

    async function loadReport() {
      try {
        const res = await fetch("data/report.json?t=" + Date.now());
        if (!res.ok) throw new Error("report.json not found");
        const report = await res.json();

        // Stats
        const s = report.summary || {};
        document.getElementById("stats").innerHTML = [
          { label: "監視対象", value: s.total ?? 0 },
          { label: "変更あり", value: s.changed ?? 0 },
          { label: "初回取得", value: s.new ?? 0 },
          { label: "変更なし", value: s.unchanged ?? 0 },
          { label: "エラー",   value: s.error ?? 0 },
        ].map(item => `
          <div class="stat-card">
            <div class="label">${item.label}</div>
            <div class="value">${item.value}</div>
          </div>
        `).join("");

        // Cards
        const results = report.results || [];
        results.sort((a, b) => {
          const order = { changed: 0, new: 1, error: 2, unchanged: 3 };
          return (order[a.status] ?? 9) - (order[b.status] ?? 9);
        });
        document.getElementById("cards").innerHTML = results.map(renderCard).join("");

        // Footer
        if (report.generated_at) {
          const d = new Date(report.generated_at);
          document.getElementById("generated-at").textContent =
            "最終更新: " + d.toLocaleString("ja-JP", { timeZone: "Asia/Tokyo" }) + " JST";
        }

        document.getElementById("loading").style.display = "none";
        document.getElementById("app").style.display = "block";
      } catch (e) {
        document.getElementById("loading").textContent =
          "レポートが見つかりません。GitHub Actionsを実行してください。(" + e.message + ")";
      }
    }

    async function loadHistory() {
      try {
        const res = await fetch("data/history.json?t=" + Date.now());
        if (!res.ok) return;
        const history = await res.json();
        if (!history.length) return;

        document.getElementById("history-section").style.display = "block";
        document.getElementById("history-list").innerHTML = history.map((entry, i) => {
          const changed = (entry.summary?.changed ?? 0) + (entry.summary?.new ?? 0);
          const resultsHtml = (entry.results || [])
            .filter(r => r.status === "changed" || r.status === "new")
            .map(r => `
              <div style="margin-top:0.75rem">
                <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem">
                  <span style="font-weight:600">${r.name}</span>
                  ${badge(r.status)}
                </div>
                ${renderAnalysis(r.analysis)}
              </div>
            `).join("");

          return `
            <div class="history-item">
              <div class="history-header" onclick="toggleHistory(${i})">
                <span class="history-date">${entry.date}</span>
                <span class="badge badge-changed">${changed} 件変更</span>
                <span class="history-arrow" id="arrow-${i}">▼</span>
              </div>
              <div class="history-body" id="body-${i}">
                ${resultsHtml || '<p style="color:var(--text-muted);padding-top:0.75rem">詳細なし</p>'}
              </div>
            </div>
          `;
        }).join("");
      } catch (e) {
        // 履歴なしは無視
      }
    }

    function toggleHistory(i) {
      const body = document.getElementById("body-" + i);
      const arrow = document.getElementById("arrow-" + i);
      body.classList.toggle("open");
      arrow.classList.toggle("open");
    }

    loadReport();
    loadHistory();
  </script>
</body>
</html>
